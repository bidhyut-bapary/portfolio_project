    <meta name="twitter:card" content="summary_large_image">

    <!-- Google Fonts - Hind Siliguri for Bengali Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Background Light Effects -->
    <div class="background-decor" aria-hidden="true">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        <div class="glow-orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <!-- Main Container -->
    <main class="page-container">
        <article class="glass-card" role="region" aria-labelledby="heading-title">
            
            <!-- Animated Icon / Badge -->
            <header class="card-header">
                <div class="badge-wrapper">
                    <span class="badge-ping" aria-hidden="true"></span>
                    <span class="badge-text">উন্নয়নশীল অবস্থা</span>
                </div>
                <div class="floating-icon-wrapper" aria-hidden="true">
                    <div class="icon-pulse-ring"></div>
                    <div class="floating-icon">🚧</div>
                </div>
            </header>

            <!-- Text Content -->
            <section class="card-body">
                <h1 id="heading-title" class="main-heading">
                    🚧 প্রজেক্ট নিয়ে কাজ চলছে
                </h1>
                <p class="description-text">
                    আমরা বর্তমানে এই প্রজেক্টের উন্নয়নের কাজ করছি।<br>
                    আরও কিছু দিনের মধ্যেই এটি সবার জন্য উন্মুক্ত করা হবে।<br>
                    আপনার ধৈর্য ও সহযোগিতার জন্য আন্তরিক ধন্যবাদ।<br>
                    অনুগ্রহ করে একটু সময় দিয়ে অপেক্ষা করুন।
                </p>
            </section>

            <!-- Interactive Back Button Link -->
            <footer class="card-footer">
                <a 
                    id="backBtn" 
                    href="https://bidhyut-bapary.github.io/portfolio_project/" 
                    class="btn-back" 
                    aria-label="পূর্ববর্তী পেজে ফিরে যান"
                >
                    <span class="btn-icon" aria-hidden="true">←</span>
                    <span class="btn-label">পিছনে যান</span>
                </a>
            </footer>
        </article>

        <!-- Subtle Footer Copyright -->
        <footer class="site-footer">
            <p>&copy; <span id="currentYear"></span> সর্বস্বত্ব সংরক্ষিত</p>
        </footer>
    </main>

    <!-- Script -->
    <script src="script.js"></script>
</body>
</html>
